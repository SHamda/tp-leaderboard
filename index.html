<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TP Leaderboard</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f3ee;
      --surface: #fffefb;
      --border:  #e2ddd5;
      --text:    #1a1815;
      --muted:   #8a8278;
      --accent:  #c84b2f;
      --gold:    #c8922f;
      --silver:  #7a8a96;
      --bronze:  #a0673a;
      --radius:  12px;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    /* ── Header ── */
    header { max-width: 860px; margin: 0 auto 2rem; }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .course-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      text-align: right;
      line-height: 1.6;
      flex-shrink: 0;
    }

    /* ── Toggle ── */
    .toggle-wrap { max-width: 860px; margin: 0 auto 1.25rem; }

    .toggle {
      display: inline-flex;
      background: var(--border);
      border-radius: 9px;
      padding: 3px;
      gap: 3px;
    }

    .toggle button {
      font-family: 'Sora', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.45rem 1.4rem;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ── Card wrapper ── */
    .card {
      max-width: 860px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    /* ══ DESKTOP TABLE ══ */
    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.8rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      white-space: nowrap;
    }

    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s, opacity 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }

    td { padding: 0.8rem 0.75rem; vertical-align: middle; }

    /* ── Row zone styles ── */
    tr.row-1 {
      background: linear-gradient(90deg, #fffbf0 0%, #fffefb 60%);
      border-left: 3px solid var(--gold);
    }
    tr.row-1:hover { background: linear-gradient(90deg, #fff4d0 0%, #fffef5 60%); }
    tr.row-1 .student-name { font-size: 1rem; color: #7a5500; }

    tr.row-2 { background: #fafbfc; border-left: 3px solid var(--silver); }
    tr.row-2:hover { background: #f0f3f5; }

    tr.row-3 { background: #fdf9f6; border-left: 3px solid var(--bronze); }
    tr.row-3:hover { background: #f5ede5; }

    tr.row-mid { border-left: 3px solid transparent; }
    tr.row-mid:hover { background: #f9f7f3; }

    tr.row-danger {
      background: #fff8f7;
      border-left: 3px solid #f4c5bb;
      opacity: 0.8;
    }
    tr.row-danger:hover { opacity: 1; background: #ffeee9; }
    tr.row-danger .student-name { color: var(--muted); }
    tr.row-danger .score-avg    { color: var(--muted); }

    /* ── Zone separator ── */
    tr.zone-label td {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.3rem 0.75rem 0.3rem 1.1rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    /* ── Rank cell ── */
    .rank {
      width: 52px;
      text-align: center;
      padding-left: 0.4rem;
      padding-right: 0.5rem;
    }

    /* Crown container — gold ring with crown SVG inside */
    .rank-crown {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fdf3dc;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 3px #fdf3dc;
    }

    .rank-crown svg { display: block; }

    .rank-medal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .rank-2 { background: #eef1f3; color: var(--silver); border: 2px solid var(--silver); }
    .rank-3 { background: #f7ede5; color: var(--bronze); border: 2px solid var(--bronze); }

    .rank-danger { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #d4897a; }
    .rank-plain  { font-family: 'DM Mono', monospace; font-size: 0.8rem;  color: var(--muted); }

    /* ── Name / Badges ── */
    .name-cell { min-width: 0; }

    .student-name {
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .badges { display: flex; gap: 0.3rem; margin-top: 0.25rem; flex-wrap: wrap; }

    .badge {
      font-size: 0.62rem;
      padding: 0.12rem 0.45rem;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.03em;
      border: 1px solid;
      white-space: nowrap;
    }

    .badge-streak  { background: #fff3e0; color: #b85c00; border-color: #f4b96a; }
    .badge-elegant { background: #e8f4f0; color: #1a6b50; border-color: #6ec9ab; }

    /* ── TP pills ── */
    .tp-scores { display: flex; gap: 0.3rem; flex-wrap: wrap; }

    .tp-pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.64rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: #eef3ff;
      border: 1px solid #b0c4f8;
      color: #2a4eb5;
      white-space: nowrap;
    }

    /* ── Score ── */
    .score-avg {
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
    }

    /* ── States ── */
    .state-row td {
      text-align: center;
      padding: 3rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      max-width: 860px;
      margin: 1.25rem auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0 0.25rem;
    }

    .legend { display: flex; gap: 1rem; flex-wrap: wrap; }

    .legend-item {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* ── Transitions ── */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    /* ══ DESKTOP ONLY ══ */
    @media (min-width: 601px) {
      .mobile-only { display: none !important; }
    }

    @media (min-width: 601px) and (max-width: 780px) {
      .hide-tablet { display: none; }
    }

    /* ══ MOBILE ══ */
    @media (max-width: 600px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      .desktop-only { display: none !important; }

      .card-list { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }

      .student-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        display: grid;
        grid-template-columns: 44px 1fr auto;
        grid-template-rows: auto auto auto;
        column-gap: 0.75rem;
        row-gap: 0.15rem;
        align-items: start;
      }

      .student-card.zone-top-1 { border-left: 3px solid var(--gold);   background: #fffbf0; }
      .student-card.zone-top-2 { border-left: 3px solid var(--silver); background: #fafbfc; }
      .student-card.zone-top-3 { border-left: 3px solid var(--bronze); background: #fdf9f6; }
      .student-card.zone-danger { border-left: 3px solid #f4c5bb; background: #fff8f7; opacity: 0.85; }
      .student-card.zone-mid   { border-left: 3px solid transparent; }
      .student-card:active { filter: brightness(0.97); }

      .card-rank {
        grid-column: 1; grid-row: 1 / 4;
        display: flex; align-items: center; justify-content: center; align-self: center;
      }

      .card-name {
        grid-column: 2; grid-row: 1;
        font-weight: 600; font-size: 0.88rem; line-height: 1.3; word-break: break-word;
      }

      .card-badges {
        grid-column: 2; grid-row: 2;
        display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.1rem;
      }

      .card-tp-row {
        grid-column: 2 / 4; grid-row: 3;
        display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: 0.4rem;
      }

      .card-scores {
        grid-column: 3; grid-row: 1 / 3;
        display: flex; flex-direction: column;
        align-items: flex-end; justify-content: center;
        gap: 0.15rem; align-self: center;
      }

      .card-total {
        font-family: 'DM Mono', monospace;
        font-size: 1.05rem;
        font-weight: 700;
      }

      .state-msg {
        text-align: center; padding: 2.5rem 1rem;
        font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted);
      }

      .zone-divider {
        font-family: 'DM Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0.5rem 0.25rem 0.1rem;
      }
    }
  </style>
</head>

<body>
<div id="app">

  <header>
    <div class="header-top">
      <div>
        <p class="course-label">DSS — Spring 2026</p>
        <h1>TP Leaderboard</h1>
      </div>
      <div class="meta">Last updated<br>{{ lastUpdated }}</div>
    </div>
  </header>

  <div class="toggle-wrap">
    <div class="toggle" role="tablist" aria-label="Select group">
      <button role="tab" :aria-selected="activeGroup===1" :class="{active:activeGroup===1}" @click="activeGroup=1">Group 1</button>
      <button role="tab" :aria-selected="activeGroup===2" :class="{active:activeGroup===2}" @click="activeGroup=2">Group 2</button>
    </div>
  </div>

  <div class="card">

    <!-- ══ DESKTOP TABLE ══ -->
    <transition name="fade" mode="out-in">
      <table class="desktop-only" :key="'tbl-'+activeGroup" :aria-label="`Group ${activeGroup} leaderboard`">
        <thead>
          <tr>
            <th class="num">#</th>
            <th>Student</th>
            <th class="hide-tablet">TP Scores</th>
            <th class="num">Average</th>
          </tr>
        </thead>
        <tbody>
          <tr v-if="loading" class="state-row"><td colspan="4"><span class="spinner"></span> Loading scores…</td></tr>
          <tr v-else-if="error" class="state-row"><td colspan="4">⚠️ {{ error }}</td></tr>
          <tr v-else-if="currentGroup.length===0" class="state-row"><td colspan="4">No data found for this group.</td></tr>

          <template v-else>
            <template v-for="(student, idx) in currentGroup" :key="student.id">

              <tr v-if="idx===3 && currentGroup.length>5" class="zone-label">
                <td colspan="4">Middle of the pack</td>
              </tr>
              <tr v-if="idx===dangerStart && currentGroup.length>5" class="zone-label">
                <td colspan="4">⚠ Danger zone</td>
              </tr>

              <tr :class="rowClass(student, idx)">

                <!-- Rank -->
                <td class="rank">
                  <!-- #1 gets a crown -->
                  <span v-if="student.rank===1" class="rank-crown" title="1st place">
                    <svg width="16" height="14" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M1 11H15V13H1V11Z" fill="#c8922f"/>
                      <path d="M1 11L3.5 4L8 8L12.5 4L15 11H1Z" fill="#c8922f"/>
                      <circle cx="1"  cy="4" r="1.5" fill="#c8922f"/>
                      <circle cx="15" cy="4" r="1.5" fill="#c8922f"/>
                      <circle cx="8"  cy="2" r="1.5" fill="#c8922f"/>
                    </svg>
                  </span>
                  <span v-else-if="student.rank===2" class="rank-medal rank-2">2</span>
                  <span v-else-if="student.rank===3" class="rank-medal rank-3">3</span>
                  <span v-else-if="isDanger(idx)" class="rank-danger">{{ student.rank }}</span>
                  <span v-else class="rank-plain">{{ student.rank }}</span>
                </td>

                <!-- Name + badges -->
                <td class="name-cell">
                  <div class="student-name">{{ student.name }}</div>
                  <div class="badges" v-if="student.badges.length">
                    <span v-for="b in student.badges" :key="b.type" :class="`badge badge-${b.type}`">{{ b.label }}</span>
                  </div>
                </td>

                <!-- TP pills -->
                <td class="hide-tablet">
                  <div class="tp-scores">
                    <span v-for="(val, i) in student.activeScores" :key="i" class="tp-pill">
                      TP{{ String(i+1).padStart(2,'0') }}: {{ val !== null ? val : '—' }}
                    </span>
                  </div>
                </td>

                <!-- Average -->
                <td class="score-avg">{{ student.average !== null ? student.average.toFixed(2) : '—' }}</td>

              </tr>
            </template>
          </template>
        </tbody>
      </table>
    </transition>

    <!-- ══ MOBILE CARD LIST ══ -->
    <transition name="fade" mode="out-in">
      <div class="mobile-only" :key="'mob-'+activeGroup">
        <div v-if="loading" class="state-msg"><span class="spinner"></span> Loading scores…</div>
        <div v-else-if="error" class="state-msg">⚠️ {{ error }}</div>
        <div v-else-if="currentGroup.length===0" class="state-msg">No data found for this group.</div>

        <div v-else class="card-list">
          <template v-for="(student, idx) in currentGroup" :key="student.id">
            <div v-if="idx===3 && currentGroup.length>5" class="zone-divider">Middle of the pack</div>
            <div v-if="idx===dangerStart && currentGroup.length>5" class="zone-divider">⚠ Danger zone</div>

            <div class="student-card" :class="mobileCardClass(student, idx)">

              <div class="card-rank">
                <span v-if="student.rank===1" class="rank-crown" title="1st place">
                  <svg width="16" height="14" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 11H15V13H1V11Z" fill="#c8922f"/>
                    <path d="M1 11L3.5 4L8 8L12.5 4L15 11H1Z" fill="#c8922f"/>
                    <circle cx="1"  cy="4" r="1.5" fill="#c8922f"/>
                    <circle cx="15" cy="4" r="1.5" fill="#c8922f"/>
                    <circle cx="8"  cy="2" r="1.5" fill="#c8922f"/>
                  </svg>
                </span>
                <span v-else-if="student.rank===2" class="rank-medal rank-2">2</span>
                <span v-else-if="student.rank===3" class="rank-medal rank-3">3</span>
                <span v-else-if="isDanger(idx)" class="rank-danger">{{ student.rank }}</span>
                <span v-else class="rank-plain">{{ student.rank }}</span>
              </div>

              <div class="card-name">{{ student.name }}</div>

              <div class="card-scores">
                <span class="card-total">{{ student.average !== null ? student.average.toFixed(2) : '—' }}</span>
              </div>

              <div class="card-badges" v-if="student.badges.length">
                <span v-for="b in student.badges" :key="b.type" :class="`badge badge-${b.type}`">{{ b.label }}</span>
              </div>

              <div class="card-tp-row">
                <span v-for="(val, i) in student.activeScores" :key="i" class="tp-pill">
                  TP{{ String(i+1).padStart(2,'0') }}: {{ val !== null ? val : '—' }}
                </span>
              </div>

            </div>
          </template>
        </div>
      </div>
    </transition>

  </div>

  <footer>
    <div class="legend">
      <span class="legend-item">🔥 <strong>Streak</strong> — 3 perfect submissions</span>
      <span class="legend-item">💡 <strong>Elegant</strong> — best code of the TP</span>
    </div>
  </footer>

</div>

<script>
const CSV_URLS = {
  group1: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfR1rxjBpgPsOaC3W-b8RKwHBxV72WkiKqu9yqLleGFUyKk9t39Xxrfwm7AUx9YbnnOW2cQ0Vjaa3E/pub?gid=682839703&single=true&output=csv',
  group2: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfR1rxjBpgPsOaC3W-b8RKwHBxV72WkiKqu9yqLleGFUyKk9t39Xxrfwm7AUx9YbnnOW2cQ0Vjaa3E/pub?gid=0&single=true&output=csv',
}

const BADGE_MAP = {
  streak:  { type: 'streak',  label: '🔥 Streak'  },
  elegant: { type: 'elegant', label: '💡 Elegant' },
}

function parseBadges(raw) {
  if (!raw || !raw.trim()) return []
  return raw.split(',').map(b => b.trim().toLowerCase()).filter(b => BADGE_MAP[b]).map(b => BADGE_MAP[b])
}

const TP_COLS = ['TP01','TP02','TP03','TP04','TP05','TP06','TP07']

function parseNum(val) {
  if (val === undefined || val === null || val.toString().trim() === '') return null
  const n = parseFloat(val.toString().replace(',', '.'))
  return isNaN(n) ? null : n
}

function rowToStudent(row, index) {
  const tpScores = TP_COLS.map(col => parseNum(row[col]))
  const filledScores = tpScores.filter(v => v !== null)
  const computedAvg = filledScores.length
    ? filledScores.reduce((a, b) => a + b, 0) / filledScores.length : null

  return {
    id:           row['ID'] || index,
    name:         (row['Team Name'] || '').trim(),
    tpScores,
    average:      parseNum(row['Average']) ?? computedAvg,
    badges:       parseBadges(row['Badges']),
    rank:         0,
    activeScores: [],
  }
}

function computeActiveColumns(students) {
  return TP_COLS.map((_, col) => students.some(s => s.tpScores[col] !== null))
}

function rankAndSort(students) {
  const sorted = [...students].sort((a, b) => {
    if (a.average === null && b.average === null) return a.name.localeCompare(b.name)
    if (a.average === null) return 1
    if (b.average === null) return -1
    if (b.average !== a.average) return b.average - a.average
    return a.name.localeCompare(b.name)
  })

  let rank = 1
  sorted.forEach((s, i) => {
    if (i > 0 && s.average !== sorted[i-1].average) rank = i + 1
    s.rank = rank
  })

  const activeFlags = computeActiveColumns(sorted)
  sorted.forEach(s => {
    s.activeScores = s.tpScores.filter((_, i) => activeFlags[i])
  })

  return sorted
}

function fetchCSV(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true, header: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error:    e => reject(e),
    })
  })
}

const { createApp } = Vue

createApp({
  data() {
    return {
      activeGroup: 1,
      groups: { 1: [], 2: [] },
      loading: true,
      error: null,
      lastUpdated: '—',
    }
  },

  computed: {
    currentGroup() { return this.groups[this.activeGroup] },
    dangerStart() {
      const n = this.currentGroup.length
      return n > 5 ? n - 3 : Infinity
    },
  },

  methods: {
    isDanger(idx) {
      return this.currentGroup.length > 5 && idx >= this.dangerStart
    },
    rowClass(student, idx) {
      if (student.rank === 1) return 'row-1'
      if (student.rank === 2) return 'row-2'
      if (student.rank === 3) return 'row-3'
      if (this.isDanger(idx))  return 'row-danger'
      return 'row-mid'
    },
    mobileCardClass(student, idx) {
      if (student.rank === 1) return 'zone-top-1'
      if (student.rank === 2) return 'zone-top-2'
      if (student.rank === 3) return 'zone-top-3'
      if (this.isDanger(idx))  return 'zone-danger'
      return 'zone-mid'
    },
  },

  async mounted() {
    try {
      this.lastUpdated = new Date().toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric'
      })
      const [rows1, rows2] = await Promise.all([fetchCSV(CSV_URLS.group1), fetchCSV(CSV_URLS.group2)])
      this.groups[1] = rankAndSort(rows1.filter(r => (r['Team Name']||'').trim()).map(rowToStudent))
      this.groups[2] = rankAndSort(rows2.filter(r => (r['Team Name']||'').trim()).map(rowToStudent))
    } catch (err) {
      console.error(err)
      this.error = 'Could not load scores. Check your sheet is published to the web.'
    } finally {
      this.loading = false
    }
  }
}).mount('#app')
</script>
</body>
</html>
